name: Send Telegram Dashboard Notification

on:
  schedule:
    # เวลาทั้งหมดเป็น UTC — ICT คือ UTC+7
    - cron: '30 1 * * *'   # 08:30 ICT (Morning Brief)
    - cron: '30 6 * * *'   # 13:30 ICT (Asian Recap)
    - cron: '0 18 * * *'   # 01:00 ICT (London/NY Recap)
  workflow_dispatch: {}     # ปุ่มกดทดสอบเองได้

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine message based on time
        id: msg
        run: |
          HOUR_UTC=$(date -u +%H)
          if [ "$HOUR_UTC" == "01" ]; then
            echo "text=☀️ Morning Brief พร้อมแล้ว%0A%0Aดู Dashboard วันนี้ได้ที่นี่:%0Ahttps://nemo350z.github.io/Daily-fx-pp26/" >> $GITHUB_OUTPUT
          elif [ "$HOUR_UTC" == "06" ]; then
            echo "text=🌏 Asian Recap ถึงเวลาแล้ว%0A%0Aดู Dashboard ได้ที่นี่:%0Ahttps://nemo350z.github.io/Daily-fx-pp26/" >> $GITHUB_OUTPUT
          else
            echo "text=🌙 London/NY Recap พร้อมแล้ว%0A%0Aดู Dashboard ได้ที่นี่:%0Ahttps://nemo350z.github.io/Daily-fx-pp26/" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram message
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.msg.outputs.text }}"
